<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Task Board (Confirm → Settle → WebAR)</title>

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- MQTT client for browser -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <!-- Kept (not deleted) but disabled to avoid conflicts -->
  <script type="text/plain" data-kept="true"
    src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>

  <style>
    :root{
      --bg:#F2F2F7;
      --card:#FFFFFF;
      --text:#0B0B0F;
      --muted:#6B6B73;
      --border:rgba(0,0,0,.10);
      --sep:rgba(0,0,0,.08);

      --green:#34C759;
      --red:#FF3B30;
      --blue:#007AFF;
      --orange:#FF9F0A;
      --gray:#8E8E93;

      --grayBtn:#E5E5EA;
    }

    *{box-sizing:border-box}
    html,body{height:100%; margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text);}

    .app{
      height:100%;
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      padding-top: calc(14px + env(safe-area-inset-top));
      display:flex;
      flex-direction:column;
      gap:12px;
      max-width:420px;
      margin:0 auto;
    }
    .view{display:none; height:100%;}
    .view.active{display:flex; flex-direction:column; gap:12px;}

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:44px;
      padding: 0 2px;
    }
    .navLeft, .navRight{min-width:110px; display:flex; align-items:center; gap:10px;}
    .navTitle{
      font-weight:800;
      font-size:16px;
      letter-spacing:-0.2px;
      text-align:center;
      flex:1;
    }
    .navBtn{
      appearance:none;
      border:none;
      background:transparent;
      padding:6px 8px;
      font: inherit;
      cursor:pointer;
      color: var(--blue);
      font-weight:700;
    }
    .navBtn.danger{ color: var(--red); }
    .navBtn:disabled{ opacity:.35; cursor:not-allowed; }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow: 0 4px 18px rgba(0,0,0,.06);
    }

    /* MATRIX */
    .matrixCard{ padding:10px; }
    .matrix{
      height: 360px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap:10px;
    }
    .quad{
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      cursor:pointer;
      background:#fff;
      transition: transform .08s ease;
    }
    .quad:active{ transform: scale(.99); }
    .quadTitle{
      font-weight:900;
      font-size:12px;
      line-height:1.15;
      color: rgba(0,0,0,.88);
    }
    .preview{ margin-top:8px; display:flex; flex-direction:column; gap:6px; }
    .previewItem{
      font-size:12px;
      color: rgba(0,0,0,.70);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .previewItem.done{ text-decoration: line-through; color: rgba(0,0,0,.38); }

    /* distinct category tints (NOT two reds) */
    .quad[data-cat="IU"]{ background: rgba(255,59,48,.07); }  /* red */
    .quad[data-cat="IN"]{ background: rgba(0,122,255,.07); }  /* blue */
    .quad[data-cat="NU"]{ background: rgba(255,159,10,.09); } /* orange */
    .quad[data-cat="NN"]{ background: rgba(142,142,147,.09); }/* gray */

    .primaryBtn{
      width: min(360px, 100%);
      height: 54px;
      border:none;
      border-radius:16px;
      background: var(--green);
      color: white;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      box-shadow: 0 10px 22px rgba(52,199,89,.18);
    }
    .primaryBtn:disabled{
      background: var(--grayBtn);
      color: rgba(0,0,0,.35);
      box-shadow:none;
      cursor:not-allowed;
    }
    .secondaryBtn{
      width: min(360px, 100%);
      height: 54px;
      border:1px solid var(--border);
      border-radius:16px;
      background: var(--card);
      color: var(--text);
      font-weight:900;
      font-size:16px;
      cursor:pointer;
    }

    .note{
      font-size:12px;
      color: var(--muted);
      text-align:center;
      line-height:1.25;
      min-height: 16px;
    }

    /* LIST (iOS cells) */
    .listCard{ padding: 6px 0; overflow:hidden; }
    .cell{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 12px 14px;
      border-top: 1px solid var(--sep);
    }
    .cell:first-child{ border-top:none; }
    .cellLeft{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .tagRow{ display:flex; align-items:center; gap:10px; }
    .tag{
      font-size:12px;
      font-weight:900;
      padding: 6px 10px;
      border-radius:999px;
      border: 1px solid rgba(0,0,0,.10);
      background: rgba(0,0,0,.03);
      color: rgba(0,0,0,.85);
      white-space:nowrap;
    }
    .tag.iu{ background: rgba(255,59,48,.10); border-color: rgba(255,59,48,.18); color: rgba(255,59,48,.95); }
    .tag.in{ background: rgba(0,122,255,.10); border-color: rgba(0,122,255,.18); color: rgba(0,122,255,.95); }
    .tag.nu{ background: rgba(255,159,10,.12); border-color: rgba(255,159,10,.20); color: rgba(255,159,10,.95); }
    .tag.nn{ background: rgba(142,142,147,.12); border-color: rgba(142,142,147,.22); color: rgba(142,142,147,.95); }

    .textInput{
      width:100%;
      border: 1px solid rgba(0,0,0,.10);
      border-radius:12px;
      padding:10px 10px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    .textInput::placeholder{ color: rgba(0,0,0,.30); }

    .tinyBtn{
      border:none;
      background:transparent;
      color: var(--red);
      font-weight:800;
      cursor:pointer;
      padding:6px 6px;
    }
    .tinyBtn:disabled{ opacity:.35; cursor:not-allowed; }

    .doneText{
      font-size:14px;
      color: rgba(0,0,0,.85);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .doneText.done{
      text-decoration: line-through;
      color: rgba(0,0,0,.38);
    }

    .switch{
      position:relative;
      width:44px;
      height:26px;
      flex:0 0 auto;
    }
    .switch input{ display:none; }
    .slider{
      position:absolute; inset:0;
      background: rgba(0,0,0,.10);
      border-radius:999px;
      transition:.18s;
    }
    .slider:before{
      content:"";
      position:absolute;
      width:20px; height:20px;
      left:3px; top:3px;
      background:#fff;
      border-radius:50%;
      transition:.18s;
      box-shadow: 0 2px 10px rgba(0,0,0,.18);
    }
    .switch input:checked + .slider{
      background: rgba(52,199,89,.85);
    }
    .switch input:checked + .slider:before{
      transform: translateX(18px);
    }

    /* AR overlay */
    #arOverlay{
      position:fixed;
      inset:0;
      background:#000;
      z-index:9999;
      display:none;
      color:#fff;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
      padding-top: calc(16px + env(safe-area-inset-top));
    }
    #arOverlay.show{ display:flex; flex-direction:column; gap:12px; }

    #arSceneWrap{ position:absolute; inset:0; z-index:0; }
    #arScene{
      position:absolute !important;
      inset:0 !important;
      width:100% !important;
      height:100% !important;
    }
    #arScene canvas{ width:100% !important; height:100% !important; }

    /* Hide MindAR default overlays */
    .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading, .mindar-ui-error {
      display:none !important;
      opacity:0 !important;
      pointer-events:none !important;
    }

    #arHud{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      gap:10px;
      height:100%;
      pointer-events:none;
    }
    .arTopRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      pointer-events:auto;
    }
    .arPill{
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.14);
      padding:10px 12px;
      border-radius:14px;
      backdrop-filter: blur(10px);
      max-width: 75%;
    }
    .arTitle{ font-size:14px; font-weight:900; }
    .arHint{ font-size:12px; opacity:.92; line-height:1.25; margin-top:4px; }
    .arClose{
      appearance:none;
      border:none;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.14);
      color:#fff;
      border-radius:12px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
    }
    .arSpacer{ flex:1; }
    .arDone{
      height:48px;
      border:none;
      background:#fff;
      color: var(--blue);
      font-weight:900;
      cursor:pointer;
      border-radius:16px;
      pointer-events:auto;
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- MATRIX VIEW -->
    <section id="matrixView" class="view active">
      <div class="nav">
        <div class="navLeft"></div>
        <div class="navTitle">Task Board</div>
        <div class="navRight">
          <button id="newRoundBtnTop" class="navBtn danger" style="display:none;">New Round</button>
        </div>
      </div>

      <div class="card matrixCard">
        <div class="matrix" id="matrixGrid">
          <div class="quad" data-cat="IU">
            <div class="quadTitle">Urgent,<br>Important</div>
            <div class="preview" id="previewIU"></div>
          </div>
          <div class="quad" data-cat="IN">
            <div class="quadTitle">Not Urgent,<br>Important</div>
            <div class="preview" id="previewIN"></div>
          </div>
          <div class="quad" data-cat="NU">
            <div class="quadTitle">Urgent,<br>Not Important</div>
            <div class="preview" id="previewNU"></div>
          </div>
          <div class="quad" data-cat="NN">
            <div class="quadTitle">Not Urgent,<br>Not Important</div>
            <div class="preview" id="previewNN"></div>
          </div>
        </div>
      </div>

      <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
        <button id="mainBtn" class="primaryBtn" disabled>Confirm</button>
        <div class="note" id="mainNote"></div>
      </div>
    </section>

    <!-- CATEGORY VIEW -->
    <section id="catView" class="view">
      <div class="nav">
        <div class="navLeft">
          <button id="backBtn" class="navBtn">← Back</button>
        </div>
        <div class="navTitle" id="catNavTitle">Category</div>
        <div class="navRight"></div>
      </div>

      <div class="card" style="padding:14px;">
        <div class="tagRow" style="margin-bottom:10px;">
          <span class="tag iu" id="catTag">Urgent, Important</span>
        </div>

        <div class="card listCard">
          <div id="catList"></div>
        </div>

        <div style="display:flex; gap:10px; margin-top:12px;">
          <button id="addBtn" class="secondaryBtn" style="height:48px;">Add</button>
        </div>

        <div class="note" style="margin-top:10px;" id="catNote"></div>
      </div>
    </section>

    <!-- SETTLEMENT VIEW -->
    <section id="settleView" class="view">
      <div class="nav">
        <div class="navLeft">
          <button id="settleBackBtn" class="navBtn">← Back</button>
        </div>
        <div class="navTitle">Settlement</div>
        <div class="navRight">
          <button id="settleNewRoundText" class="navBtn danger" style="display:none;">New Round</button>
        </div>
      </div>

      <div class="card" style="padding:14px;">
        <div style="font-weight:900; font-size:18px;">Mark done</div>
        <div class="note" id="settleNote" style="text-align:left; margin-top:6px;">Toggle completed tasks, then view AR.</div>

        <div class="card listCard" style="margin-top:12px;">
          <div id="settleList"></div>
        </div>

        <div style="display:flex; flex-direction:column; gap:10px; margin-top:12px; align-items:center;">
          <button id="settleGoBtn" class="primaryBtn">View AR</button>
          <button id="settleRewatchBtn" class="secondaryBtn" style="display:none;">Rewatch AR</button>
        </div>
      </div>
    </section>

  </div>

  <!-- WebAR Overlay -->
  <div id="arOverlay">
    <div id="arSceneWrap">
      <a-scene
        id="arScene"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: false; uiLoading: false; uiError: false;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true, physicallyCorrectLights: true"
        embedded
      >
        <a-entity light="type: ambient; intensity: 0.85"></a-entity>
        <a-entity light="type: directional; intensity: 0.7" position="0 1 0.8"></a-entity>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="arTarget0" mindar-image-target="targetIndex: 0">
          <a-entity id="ballRoot"></a-entity>
        </a-entity>
      </a-scene>
    </div>

    <div id="arHud">
      <div class="arTopRow">
        <div class="arPill">
          <div class="arTitle" id="arTitle">AR</div>
          <div class="arHint" id="arHint">Point at target.</div>
        </div>
        <button id="arCloseBtn" class="arClose">×</button>
      </div>
      <div class="arSpacer"></div>
      <button id="arDoneBtn" class="arDone">Done</button>
    </div>
  </div>

<script>
  /***********************
   * MQTT
   ***********************/
  const MQTT_URL  = "wss://e322388267ac40b5a94526e5483de320.s1.eu.hivemq.cloud:8884/mqtt";
  const MQTT_USER = "arvase";
  const MQTT_PASS = "Ar123456";
  const TOPIC_CMD = "vase/cmd";

  let mqttClient = null;
  function initMqtt(){
    try{
      mqttClient = mqtt.connect(MQTT_URL, {
        username: MQTT_USER,
        password: MQTT_PASS,
        keepalive: 60,
        reconnectPeriod: 2000,
        connectTimeout: 8000,
        clean: true
      });
      mqttClient.on("connect", () => console.log("[MQTT] connected"));
      mqttClient.on("reconnect", () => console.log("[MQTT] reconnecting..."));
      mqttClient.on("error", (e) => console.error("[MQTT] error", e));
    }catch(e){
      console.error("[MQTT] init failed", e);
    }
  }
  initMqtt();

  function rotateVaseRel(deg){
    if (!mqttClient || !mqttClient.connected) {
      console.warn("[MQTT] not connected, skip rotate");
      return;
    }
    const d = Math.round(deg);
    mqttClient.publish(TOPIC_CMD, `rel:${d}`, { qos: 0, retain: false });
    console.log("[MQTT] publish", TOPIC_CMD, `rel:${d}`);
  }

  /***********************
   * State
   ***********************/
  const STORAGE_KEY = "eisen_matrix_v4_state";
  const MODE_KEY    = "eisen_matrix_v4_mode";
  const ROUND_KEY   = "eisen_matrix_v4_round";

  const MODE = { PLAN:"plan", CHECK:"check" };
  const MAX_PER_CAT = 3;

  const CATS = ["IU","IN","NU","NN"];
  const CAT_META = {
    IU: { title: "Urgent, Important", tagClass: "iu" },
    IN: { title: "Not Urgent, Important", tagClass: "in" },
    NU: { title: "Urgent, Not Important", tagClass: "nu" },
    NN: { title: "Not Urgent, Not Important", tagClass: "nn" }
  };

  let state = loadState();
  let mode  = loadMode();
  let round = loadRound();
  let currentCat = null;

  function cryptoId(){
    return (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(16).slice(2));
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { IU:[], IN:[], NU:[], NN:[] };
      const parsed = JSON.parse(raw);
      for (const c of CATS) if (!Array.isArray(parsed[c])) parsed[c] = [];
      for (const c of CATS){
        parsed[c] = parsed[c].map(t => ({
          id: t.id || cryptoId(),
          text: typeof t.text === "string" ? t.text : "",
          done: !!t.done
        })).slice(0, MAX_PER_CAT);
      }
      return parsed;
    }catch{
      return { IU:[], IN:[], NU:[], NN:[] };
    }
  }
  function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function loadMode(){
    const m = localStorage.getItem(MODE_KEY);
    return (m === MODE.CHECK) ? MODE.CHECK : MODE.PLAN;
  }
  function saveMode(){ localStorage.setItem(MODE_KEY, mode); }

  function loadRound(){
    try{
      const raw = localStorage.getItem(ROUND_KEY);
      if (!raw) return null;
      const r = JSON.parse(raw);
      if (!r || typeof r.id !== "string") return null;
      return {
        id: r.id,
        settledAt: (typeof r.settledAt === "number") ? r.settledAt : null,
        snapshot: r.snapshot || null
      };
    }catch{ return null; }
  }
  function saveRound(){
    if (!round) localStorage.removeItem(ROUND_KEY);
    else localStorage.setItem(ROUND_KEY, JSON.stringify(round));
  }
  function isRoundSettled(){ return !!round?.settledAt; }
  function startRound(){ round = { id: cryptoId(), settledAt: null, snapshot: null }; saveRound(); }
  function settleRound(snapshot){
    if (!round) startRound();
    round.settledAt = Date.now();
    round.snapshot = snapshot || null;
    saveRound();
  }
  function clearRound(){ round = null; saveRound(); }

  if (mode === MODE.CHECK && !round) startRound();

  function allTasks(){ return CATS.flatMap(c => state[c]); }
  function totalTasks(){ return allTasks().length; }
  function completedCount(){ return allTasks().reduce((a,t)=>a+(t.done?1:0),0); }
  function completionRatio(){
    const total = totalTasks();
    return total ? (completedCount()/total) : 0;
  }

  function computeOutcomeAndCount(){
    const total = totalTasks();
    const done = completedCount();
    const undone = total - done;

    const hasNon2 = (state.IU.length + state.IN.length + state.NU.length) > 0;
    const only2 = (!hasNon2) && (state.NN.length > 0);

    const ratio = completionRatio();

    let outcome;
    if (only2){
      outcome = "chill";
    } else {
      outcome = (ratio >= (2/3)) ? "celebrate" : "fall";
    }

    let nBalls = (outcome === "fall") ? (undone * 3) : (done * 3);
    nBalls = Math.min(nBalls, 60);

    return { outcome, nBalls, total, done, undone, ratio, only2 };
  }

  function rotationDegForOutcome(outcome){
    if (outcome === "fall") return 180;
    if (outcome === "chill") return 60;
    return 120;
  }

  /***********************
   * AR balls
   ***********************/
  const ballRoot = document.getElementById("ballRoot");
  function clearBalls(){
    if (!ballRoot) return;
    while (ballRoot.firstChild) ballRoot.removeChild(ballRoot.firstChild);
  }
  function rand(min,max){ return min + Math.random()*(max-min); }
  function randInt(min,max){ return Math.floor(rand(min,max+1)); }
  function randomBrightColor(){
    const palette = ["#ff3b30","#ff9500","#ffcc00","#34c759","#5ac8fa","#007aff","#5856d6","#ff2d55"];
    return palette[randInt(0, palette.length-1)];
  }

  function addBallCelebrate(){
    const s = document.createElement("a-sphere");
    s.setAttribute("radius", rand(0.035, 0.055).toFixed(3));
    s.setAttribute("material", `color: ${randomBrightColor()}; metalness: 0.95; roughness: 0.18`);

    const x = rand(-0.18, 0.18);
    const z = rand(0.05, 0.28);
    const baseY = rand(-0.05, 0.08);
    s.setAttribute("position", `${x.toFixed(3)} ${baseY.toFixed(3)} ${z.toFixed(3)}`);

    const jump = rand(0.10, 0.22);
    const dur1 = randInt(700, 1200);
    const delay = randInt(0, 500);
    s.setAttribute("animation__jump",
      `property: position; dir: alternate; dur: ${dur1}; delay: ${delay}; loop: true; easing: easeInOutSine; to: ${x.toFixed(3)} ${(baseY+jump).toFixed(3)} ${z.toFixed(3)}`);

    const dur2 = randInt(900, 1600);
    s.setAttribute("animation__rock",
      `property: rotation; dir: alternate; dur: ${dur2}; delay: ${delay}; loop: true; easing: easeInOutSine; to: ${rand(-12,12).toFixed(1)} ${rand(-25,25).toFixed(1)} ${rand(-12,12).toFixed(1)}`);

    return s;
  }

  function addBallFall(){
    const s = document.createElement("a-sphere");
    s.setAttribute("radius", rand(0.040, 0.060).toFixed(3));
    s.setAttribute("material", `color: #7a7a7a; metalness: 0.0; roughness: 1.0`);

    const x = rand(-0.22, 0.22);
    const z = rand(0.06, 0.30);
    const startY = rand(0.20, 0.50);
    const endY = rand(-0.55, -0.30);
    s.setAttribute("position", `${x.toFixed(3)} ${startY.toFixed(3)} ${z.toFixed(3)}`);

    const dur = randInt(700, 1400);
    const delay = randInt(0, 700);

    s.setAttribute("animation__fall",
      `property: position; dur: ${dur}; delay: ${delay}; loop: true; easing: easeInQuad; to: ${(x + rand(-0.06,0.06)).toFixed(3)} ${endY.toFixed(3)} ${(z + rand(-0.04,0.04)).toFixed(3)}`);

    s.addEventListener("animationcomplete__fall", () => {
      const nx = rand(-0.22, 0.22);
      const nz = rand(0.06, 0.30);
      const ny = rand(0.20, 0.50);
      s.setAttribute("position", `${nx.toFixed(3)} ${ny.toFixed(3)} ${nz.toFixed(3)}`);
    });

    return s;
  }

  function addBallChill(){
    const wrap = document.createElement("a-entity");
    const x0 = rand(-0.18, 0.18);
    const z0 = rand(0.07, 0.28);
    wrap.setAttribute("position", `${x0.toFixed(3)} 0 ${z0.toFixed(3)}`);

    const dx = rand(0.10, 0.18) * (Math.random()<0.5?-1:1);
    const dz = rand(0.08, 0.16) * (Math.random()<0.5?-1:1);
    const swayDur = randInt(1800, 3200);
    const delay = randInt(0, 800);

    wrap.setAttribute("animation__sway",
      `property: position; dir: alternate; dur: ${swayDur}; delay: ${delay}; loop: true; easing: easeInOutSine;
       to: ${(x0+dx).toFixed(3)} 0 ${(z0+dz).toFixed(3)}`);

    const s = document.createElement("a-sphere");
    s.setAttribute("radius", rand(0.038, 0.055).toFixed(3));
    s.setAttribute("material", `color: #7fffe2; metalness: 0.85; roughness: 0.25`);

    const y0 = rand(-0.02, 0.14);
    const dy = rand(0.08, 0.16);
    s.setAttribute("position", `0 ${y0.toFixed(3)} 0`);

    const bobDur = randInt(1500, 2600);
    s.setAttribute("animation__bob",
      `property: position; dir: alternate; dur: ${bobDur}; delay: ${delay}; loop: true; easing: easeInOutSine;
       to: 0 ${(y0+dy).toFixed(3)} 0`);

    wrap.appendChild(s);
    return wrap;
  }

  function buildARVisual(snapshot){
    clearBalls();
    for (let i=0; i<snapshot.nBalls; i++){
      let ball;
      if (snapshot.outcome === "celebrate") ball = addBallCelebrate();
      else if (snapshot.outcome === "fall") ball = addBallFall();
      else ball = addBallChill();
      ballRoot.appendChild(ball);
    }
  }

  /***********************
   * Views
   ***********************/
  const matrixView = document.getElementById("matrixView");
  const catView    = document.getElementById("catView");
  const settleView = document.getElementById("settleView");

  const mainBtn   = document.getElementById("mainBtn");
  const mainNote  = document.getElementById("mainNote");
  const newRoundBtnTop = document.getElementById("newRoundBtnTop");

  const backBtn   = document.getElementById("backBtn");
  const catNavTitle = document.getElementById("catNavTitle");
  const catTag = document.getElementById("catTag");
  const catList = document.getElementById("catList");
  const addBtn  = document.getElementById("addBtn");
  const catNote = document.getElementById("catNote");

  const settleBackBtn = document.getElementById("settleBackBtn");
  const settleNewRoundText = document.getElementById("settleNewRoundText");
  const settleList = document.getElementById("settleList");
  const settleNote = document.getElementById("settleNote");
  const settleGoBtn = document.getElementById("settleGoBtn");
  const settleRewatchBtn = document.getElementById("settleRewatchBtn");

  function showMatrix(){
    currentCat = null;
    catView.classList.remove("active");
    settleView.classList.remove("active");
    matrixView.classList.add("active");
    renderMatrix();
  }

  function showCategory(cat){
    currentCat = cat;
    matrixView.classList.remove("active");
    settleView.classList.remove("active");
    catView.classList.add("active");

    const meta = CAT_META[cat];
    catNavTitle.textContent = meta.title;

    catTag.classList.remove("iu","in","nu","nn");
    catTag.classList.add(meta.tagClass);
    catTag.textContent = meta.title;

    renderCategory(cat);
  }

  function showSettlement(){
    matrixView.classList.remove("active");
    catView.classList.remove("active");
    settleView.classList.add("active");
    renderSettlement();
  }

  document.getElementById("matrixGrid").addEventListener("click", (e) => {
    const quad = e.target.closest(".quad");
    if (!quad) return;
    showCategory(quad.dataset.cat);
  });

  backBtn.addEventListener("click", showMatrix);
  settleBackBtn.addEventListener("click", showMatrix);

  function renderMatrix(){
    for (const cat of CATS){
      const box = document.getElementById("preview"+cat);
      box.innerHTML = "";
      const items = state[cat].slice(0,3);
      for (const t of items){
        const div = document.createElement("div");
        div.className = "previewItem" + (t.done ? " done" : "");
        div.textContent = "• " + (t.text || "(empty)");
        box.appendChild(div);
      }
    }

    if (mode === MODE.PLAN){
      newRoundBtnTop.style.display = "none";
      const canConfirm = totalTasks() > 0;
      mainBtn.textContent = "Confirm";
      mainBtn.disabled = !canConfirm;
      mainNote.textContent = canConfirm ? `Max ${MAX_PER_CAT} per category.` : "Add 1+ todo.";
    } else {
      const settled = isRoundSettled();
      const hasTasks = totalTasks() > 0;

      newRoundBtnTop.style.display = settled ? "inline-block" : "none";

      mainBtn.textContent = settled ? "Settled ✅" : "Settle";
      mainBtn.disabled = !hasTasks || settled;
      mainNote.textContent = !hasTasks ? "No todos." : (settled ? "Settled. You can rewatch AR." : "Settle once → AR.");
    }
  }

  function renderCategory(cat){
    catList.innerHTML = "";
    const items = state[cat];

    if (mode === MODE.PLAN){
      addBtn.disabled = items.length >= MAX_PER_CAT;
      catNote.textContent = items.length >= MAX_PER_CAT ? "Limit reached." : "";

      items.forEach((task) => {
        const row = document.createElement("div");
        row.className = "cell";

        const left = document.createElement("div");
        left.className = "cellLeft";

        const input = document.createElement("input");
        input.className = "textInput";
        input.placeholder = "Todo";
        input.value = task.text || "";
        input.addEventListener("input", () => {
          task.text = input.value;
          saveState();
          renderMatrix();
        });

        left.appendChild(input);

        const del = document.createElement("button");
        del.className = "tinyBtn";
        del.textContent = "Delete";
        del.addEventListener("click", () => {
          state[cat] = state[cat].filter(t => t.id !== task.id);
          saveState();
          renderCategory(cat);
          renderMatrix();
        });

        row.appendChild(left);
        row.appendChild(del);
        catList.appendChild(row);
      });
    } else {
      addBtn.disabled = true;
      catNote.textContent = "Locked.";

      items.forEach((task) => {
        const row = document.createElement("div");
        row.className = "cell";

        const left = document.createElement("div");
        left.className = "cellLeft";

        const txt = document.createElement("div");
        txt.className = "doneText" + (task.done ? " done" : "");
        txt.textContent = task.text || "(empty)";
        left.appendChild(txt);

        row.appendChild(left);
        catList.appendChild(row);
      });
    }
  }

  addBtn.addEventListener("click", () => {
    if (mode !== MODE.PLAN) return;
    if (!currentCat) return;
    if (state[currentCat].length >= MAX_PER_CAT) return;

    state[currentCat].push({ id: cryptoId(), text: "", done: false });
    saveState();
    renderCategory(currentCat);
    renderMatrix();

    requestAnimationFrame(() => {
      const inputs = catList.querySelectorAll("input.textInput");
      const last = inputs[inputs.length - 1];
      last && last.focus();
    });
  });

  function renderSettlement(){
    settleList.innerHTML = "";
    const settled = isRoundSettled();

    settleGoBtn.style.display = settled ? "none" : "inline-block";
    settleRewatchBtn.style.display = settled ? "inline-block" : "none";
    settleNewRoundText.style.display = settled ? "inline-block" : "none";

    settleGoBtn.disabled = totalTasks() === 0;
    settleRewatchBtn.disabled = !settled;

    if (!settled) {
      const snap = computeOutcomeAndCount();
      settleNote.textContent = `Outcome preview: ${snap.outcome}.`;
    } else {
      settleNote.textContent = `Settled: ${round?.snapshot?.outcome || "fall"}.`;
    }

    for (const cat of CATS){
      const tasks = state[cat];
      if (!tasks.length) continue;

      const header = document.createElement("div");
      header.className = "cell";
      header.style.background = "rgba(0,0,0,.02)";

      const leftH = document.createElement("div");
      leftH.className = "cellLeft";

      const meta = CAT_META[cat];

      const tagRow = document.createElement("div");
      tagRow.className = "tagRow";

      const tag = document.createElement("span");
      tag.className = "tag " + meta.tagClass;
      tag.textContent = meta.title;

      tagRow.appendChild(tag);
      leftH.appendChild(tagRow);
      header.appendChild(leftH);
      settleList.appendChild(header);

      tasks.forEach((task) => {
        const row = document.createElement("div");
        row.className = "cell";

        const left = document.createElement("div");
        left.className = "cellLeft";

        const txt = document.createElement("div");
        txt.className = "doneText" + (task.done ? " done" : "");
        txt.textContent = task.text || "(empty)";
        left.appendChild(txt);

        const sw = document.createElement("label");
        sw.className = "switch";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!task.done;
        cb.disabled = settled;

        cb.addEventListener("change", () => {
          if (settled) return;
          task.done = cb.checked;
          saveState();
          renderSettlement();
          renderMatrix();
          if (currentCat) renderCategory(currentCat);
        });

        const slider = document.createElement("span");
        slider.className = "slider";
        sw.appendChild(cb);
        sw.appendChild(slider);

        row.appendChild(left);
        row.appendChild(sw);
        settleList.appendChild(row);
      });
    }
  }

  mainBtn.addEventListener("click", () => {
    if (mode === MODE.PLAN){
      if (totalTasks() === 0) return;
      for (const c of CATS) for (const t of state[c]) t.done = false;

      mode = MODE.CHECK;
      startRound();
      saveMode();
      saveState();
      showMatrix();
      return;
    }

    if (isRoundSettled()) return;
    if (totalTasks() === 0) return;
    showSettlement();
  });

  function startNewRoundFromAnywhere(){
    if (!confirm("Start a new round?")) return;

    closeAR(true);
    state = { IU:[], IN:[], NU:[], NN:[] };
    mode = MODE.PLAN;
    saveMode();
    saveState();
    clearRound();
    showMatrix();
  }
  newRoundBtnTop.addEventListener("click", startNewRoundFromAnywhere);
  settleNewRoundText.addEventListener("click", startNewRoundFromAnywhere);

  /***********************
   * WebAR
   ***********************/
  const arOverlay = document.getElementById("arOverlay");
  const arDoneBtn = document.getElementById("arDoneBtn");
  const arCloseBtn = document.getElementById("arCloseBtn");
  const arHint    = document.getElementById("arHint");
  const arTitle   = document.getElementById("arTitle");
  const arScene   = document.getElementById("arScene");
  const arTarget0 = document.getElementById("arTarget0");

  async function openAR(snapshot){
    buildARVisual(snapshot);
    arTitle.textContent = `AR · ${snapshot.outcome}`;
    arHint.textContent = "Point at target.";

    arOverlay.classList.add("show");
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    try { arScene.play && arScene.play(); } catch {}
    const sys = arScene.systems && arScene.systems["mindar-image-system"];
    if (!sys){
      arHint.textContent = "AR init failed.";
      return;
    }

    try{
      await sys.start();
      try { arScene.resize && arScene.resize(); } catch {}
    }catch(e){
      arHint.textContent = "Camera blocked.";
      console.error(e);
    }
  }

  async function stopAR(){
    try{
      const sys = arScene.systems && arScene.systems["mindar-image-system"];
      if (sys) await sys.stop();
    }catch(e){}
    try { arScene.pause && arScene.pause(); } catch {}
  }

  async function closeAR(silent=false){
    await stopAR();
    arOverlay.classList.remove("show");
    if (!silent) showSettlement();
  }

  if (arTarget0){
    arTarget0.addEventListener("targetFound", () => { arHint.textContent = "Found ✅"; });
    arTarget0.addEventListener("targetLost",  () => { arHint.textContent = "Point at target."; });
  }

  arDoneBtn.addEventListener("click", () => closeAR(false));
  arCloseBtn.addEventListener("click", () => closeAR(false));

  settleGoBtn.addEventListener("click", async () => {
    if (isRoundSettled()) return;
    if (totalTasks() === 0) return;

    const snap = computeOutcomeAndCount();
    settleRound(snap);

    rotateVaseRel(rotationDegForOutcome(round.snapshot.outcome));

    await openAR(round.snapshot);
    renderSettlement();
    renderMatrix();
  });

  settleRewatchBtn.addEventListener("click", async () => {
    if (!isRoundSettled()) return;
    if (!round?.snapshot) return;
    await openAR(round.snapshot);
  });

  showMatrix();
</script>
</body>
</html>
